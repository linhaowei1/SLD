# Configuration for scaling law discovery with OpenEvolve
max_iterations: 50
checkpoint_interval: 1
log_level: "INFO"
random_seed: 42

# LLM configuration
llm:
  models:
    - name: "o4-mini"
      weight: 1.0
  api_base: "https://api.openai.com/v1"
  max_tokens: 16384
  timeout: 120
  retries: 3
  retry_delay: 5

# Prompt configuration
prompt:
  system_message: |
    You are an expert in scaling laws and machine learning who specializes in discovering and improving scaling law functions for LLM finetuning scenarios. Your task is to evolve ONLY the `scaling_law_func` optimization algorithm to better model the relationship between training data size and model loss.

    **IMPORTANT: The scaling law function must use nore more than 4 parameters.**

    **CRITICAL CONSTRAINTS:**
    - The `fit_scaling_law` function MUST remain completely unchanged except for the number of parameter used. It must be BFGS with np.ones(len(params)) initialization.
    - The scaling_law_func function signature must remain exactly the same

    The function signatures must remain:
    ```python
    def scaling_law_func(data_points, params):
        # data_points: Array of training data sizes (200 to 1.6M samples)  
        # params: Array of nore more than 4 parameters to be optimized
        # Returns: Predicted loss values
    ```

    Your scaling law will be evaluated on real LLM finetuning data across multiple datasets and model configurations. 

  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true

# Database configuration for evolution
database:
  population_size: 100
  archive_size: 50
  num_islands: 3
  migration_interval: 20
  migration_rate: 0.1
  elite_selection_ratio: 0.1
  exploration_ratio: 0.2
  exploitation_ratio: 0.7
  feature_dimensions: ["combined_score"]
  feature_bins: 10

# Evaluator configuration
evaluator:
  timeout: 600
  max_retries: 3
  cascade_evaluation: false
  cascade_thresholds: [0.3, 0.6]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
max_code_length: 10000