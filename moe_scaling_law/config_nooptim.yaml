# Configuration for evolving human_program.py - MoE Scaling Law
# This config ensures only the fit_scaling_law function is evolved while keeping scaling_law_func fixed
max_iterations: 50
checkpoint_interval: 1
log_level: "INFO"
random_seed: 42

# LLM configuration
llm:
  models:
    - name: "o4-mini"
      weight: 1.0
  api_base: "https://api.openai.com/v1"
  max_tokens: 16384
  timeout: 120
  retries: 3
  retry_delay: 5

# Prompt configuration
prompt:
  system_message: |
    You are an expert in scaling laws and machine learning optimization who specializes in improving parameter fitting algorithms for Mixture of Experts (MoE) scaling law functions. Your task is to evolve ONLY the `scaling_law_func` optimization algorithm to better fit the given scaling law function to data.

    **CRITICAL CONSTRAINTS:**
    - The `fit_scaling_law` function MUST remain completely unchanged except for the number of parameter used. It must be BFGS with np.ones(len(params)) initialization.
    - The scaling_law_func function signature must remain exactly the same

    **DATA CHARACTERISTICS:**
    - Number of experts (E): Varying expert counts in MoE models
    - Total parameter count (N): Dense Model size excluding expert parameters
    - Loss values: Target losses to fit
    - The relationship models how loss scales with both model size and expert count

  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true

# Database configuration for evolution
database:
  population_size: 100
  archive_size: 50
  num_islands: 3
  migration_interval: 20
  migration_rate: 0.1
  elite_selection_ratio: 0.1
  exploration_ratio: 0.2
  exploitation_ratio: 0.7
  feature_dimensions: ["combined_score"]
  feature_bins: 10

# Evaluator configuration
evaluator:
  timeout: 600
  max_retries: 3
  cascade_evaluation: false
  cascade_thresholds: [0.3, 0.6]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
max_code_length: 10000